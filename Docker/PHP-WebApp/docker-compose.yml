version: '3.8'

services:
  php-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-webapp
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./src:/var/www/html
      - ./logs:/var/log/nginx
    environment:
      - PHP_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=webapp
      - DB_USER=webapp_user
      - DB_PASSWORD=webapp_password
    depends_on:
      - mysql
    networks:
      - php_network

  mysql:
    image: mysql:8.0
    container_name: php_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: webapp
      MYSQL_USER: webapp_user
      MYSQL_PASSWORD: webapp_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - php_network
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: php_phpmyadmin
    restart: always
    ports:
      - "8083:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      - mysql
    networks:
      - php_network

volumes:
  mysql_data:

networks:
  php_network:
    driver: bridge
