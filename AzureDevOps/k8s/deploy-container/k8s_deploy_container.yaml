trigger: none
pr: none

variables:
- template: variables.yaml

parameters:
- name: imageTag
  type: string
  default: ''
- name: dryRunOnly
  type: boolean
  default: true

pool:
  vmImage: $(vmImage)

stages:

# ── Stage 1: Build & Push ──────────────────────────────────────────────────────
- stage: Build
  displayName: Build and Push Container Image
  jobs:
  - job: BuildAndPush
    timeoutInMinutes: 30
    steps:
    - checkout: self
      clean: true

    - bash: |
        set -euo pipefail

        TAG="${{ parameters.imageTag }}"
        if [ -z "$TAG" ]; then
          TAG="$(imageTag)"
        fi

        echo "##vso[task.setvariable variable=RESOLVED_TAG;isOutput=true]$TAG"
        echo "Image: $(containerRegistry)/$(imageRepository):$TAG"
      name: resolveTag
      displayName: Resolve Image Tag

    - task: Docker@2
      displayName: Build Image
      inputs:
        command: build
        containerRegistry: $(containerRegistryConnection)
        repository: $(imageRepository)
        tags: |
          $(resolveTag.RESOLVED_TAG)
          latest

    - task: Docker@2
      displayName: Push Image
      condition: and(succeeded(), eq('${{ parameters.dryRunOnly }}', 'false'))
      inputs:
        command: push
        containerRegistry: $(containerRegistryConnection)
        repository: $(imageRepository)
        tags: |
          $(resolveTag.RESOLVED_TAG)
          latest

# ── Stage 2: Deploy ────────────────────────────────────────────────────────────
- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: Build
  variables:
    RESOLVED_TAG: $[ stageDependencies.Build.BuildAndPush.outputs['resolveTag.RESOLVED_TAG'] ]
  jobs:
  - deployment: DeployToK8s
    displayName: Deploy Container
    timeoutInMinutes: 20
    environment: $(k8sNamespace)
    strategy:
      runOnce:
        deploy:
          steps:

          - bash: |
              set -euo pipefail
              echo "Deploying $(containerRegistry)/$(imageRepository):$(RESOLVED_TAG)"
              echo "Namespace: $(k8sNamespace)"
            displayName: Print Deploy Info

          # ── Raw manifest deploy ──────────────────────────────────────────────
          - task: KubernetesManifest@1
            displayName: Deploy Manifests
            condition: and(succeeded(), eq('$(useHelm)', 'false'), eq('${{ parameters.dryRunOnly }}', 'false'))
            inputs:
              action: deploy
              connectionType: kubernetesServiceConnection
              kubernetesServiceConnection: $(k8sServiceConnection)
              namespace: $(k8sNamespace)
              manifests: $(manifestsPath)/*.yaml
              containers: $(containerRegistry)/$(imageRepository):$(RESOLVED_TAG)

          # ── Helm deploy ─────────────────────────────────────────────────────
          - bash: |
              set -euo pipefail
              helm upgrade --install $(helmReleaseName) $(helmChart) \
                --namespace $(k8sNamespace) \
                --create-namespace \
                --values $(helmValuesFile) \
                --set image.repository=$(containerRegistry)/$(imageRepository) \
                --set image.tag=$(RESOLVED_TAG) \
                --atomic \
                --timeout 5m
            displayName: Helm Upgrade / Install
            condition: and(succeeded(), eq('$(useHelm)', 'true'), eq('${{ parameters.dryRunOnly }}', 'false'))

          - bash: |
              set -euo pipefail
              echo "==> Rollout status check..."
              kubectl rollout status deployment/$(helmReleaseName) -n $(k8sNamespace) --timeout=3m || true
            displayName: Verify Rollout
            condition: and(succeeded(), eq('${{ parameters.dryRunOnly }}', 'false'))

          - bash: |
              echo "[DRY RUN] Would deploy $(containerRegistry)/$(imageRepository):$(RESOLVED_TAG) to namespace $(k8sNamespace)"
            displayName: Dry Run Summary
            condition: eq('${{ parameters.dryRunOnly }}', 'true')
